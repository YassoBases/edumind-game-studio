<!DOCTYPE html>
<!--
  EduMind Archetype: lane_racer
  Pedagogical mechanic: target_practice (one correct + N distractors per question).
  Presentation: 3-lane top-down racer. Player auto-advances; tap left half to swap one lane
  left, right half to swap one lane right. Answer panels appear ahead in three lanes; player
  drives through the correct one. Wrong = heart lost + crash sequence (car keeps going).

  Every state change has a beat (GameFeel.*): score popups, combo audio, tire-smoke bursts
  on lane switch, engine-rev on level-up, screen shake on crash, parallax road + sky.
-->
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}html,body{width:100%;height:100%;overflow:hidden;background:#0b1020;}#game-container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}canvas{display:block;}</style>
</head>
<body>
<div id="game-container"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>
<script src="/client/EduCore.js"></script>
<script src="/client/GameFeel.js"></script>
<script>
window.EduSprites = window.EduSprites || { library: {}, generated: {} };
window.EduMindAPI = window.EduMindAPI || { reportScore:()=>{}, reportLevel:()=>{}, reportSummary:()=>{}, reportComplete:()=>{}, reportEvent:()=>{} };
window.EduCore.setLanguage('en');

const SPEC = {
  templateId: 'target_practice',
  archetype: 'lane_racer',
  themeId: 'car_racing_f1',
  language: 'en',
  subject: 'Biology',
  topic: 'Photosynthesis',
  theme: 'F1 racing',
  orientation: 'portrait',
  concepts: [
    { id: 'overall_equation', label: 'Overall equation', description: 'Reactants and products' },
    { id: 'light_reactions', label: 'Light reactions', description: 'Light-dependent stage' },
    { id: 'calvin_cycle', label: 'Calvin cycle', description: 'Light-independent stage' },
    { id: 'pigments', label: 'Pigments', description: 'Chlorophyll a, b, carotenoids' },
    { id: 'structures', label: 'Cell structures', description: 'Chloroplasts, thylakoids, stroma' },
    { id: 'limiting_factors', label: 'Limiting factors', description: 'Light, CO2, temperature' },
  ],
  levels: Array.from({ length: 5 }, (_, i) => ({
    index: i + 1, name: 'Lap ' + (i + 1), timeLimitSeconds: 60 - i * 5,
    hintsAvailable: Math.max(1, 3 - Math.floor(i / 2)),
    contentItems: [
      { id: 'l' + i + 'a', prompt: 'Reactants of photosynthesis?', answer: 'CO2 + H2O', distractors: ['O2 + glucose','ATP + NADPH','Glucose + O2'], concepts: ['overall_equation'], difficulty: 0.1 + i * 0.15, explanationOnWrong: 'Plants take in CO2 and H2O.' },
      { id: 'l' + i + 'b', prompt: 'Where do light reactions occur?', answer: 'Thylakoid membrane', distractors: ['Stroma','Mitochondria','Nucleus'], concepts: ['light_reactions','structures'], difficulty: 0.2 + i * 0.15, explanationOnWrong: 'Light reactions are in the thylakoid membrane.' },
      { id: 'l' + i + 'c', prompt: 'Main green pigment?', answer: 'Chlorophyll a', distractors: ['Chlorophyll b','Carotenoid','Xanthophyll'], concepts: ['pigments'], difficulty: 0.15 + i * 0.15, explanationOnWrong: 'Chlorophyll a is the primary pigment.' },
      { id: 'l' + i + 'd', prompt: 'What does the Calvin cycle produce?', answer: 'Glucose', distractors: ['ATP only','Oxygen','NADPH'], concepts: ['calvin_cycle'], difficulty: 0.25 + i * 0.15, explanationOnWrong: 'Calvin cycle fixes CO2 into glucose.' },
      { id: 'l' + i + 'e', prompt: 'Limiting factor on a cloudy day?', answer: 'Light intensity', distractors: ['CO2','Temperature','Water'], concepts: ['limiting_factors'], difficulty: 0.3 + i * 0.15, explanationOnWrong: 'On cloudy days light becomes limiting.' },
    ],
    passingScore: 0.6,
  })),
  feedback: {
    correctPool: ['Pole position!', 'Clean line', 'Onto the next bend'],
    wrongPool: ['Off the racing line', 'Reset and go', 'Check your apex'],
    levelComplete: ['Lap finished', 'Pit done, next lap'],
  },
  visualStyle: { palette: ['#0b1020','#1f2937','#dc2626','#fbbf24'], accent: '#fbbf24' },
  visualMood: 'energetic',
  audioCues: ['correct','wrong','win','lose','levelUp'],
};

const engine = window.EduCore.AdaptiveEngine.create(SPEC);
const W = 720, H = 1280;
const LANE_X = [W * 0.22, W * 0.50, W * 0.78];
const PLAYER_Y = H * 0.82;
const PROMPT_BAND_H = 200;
const GATE_SPAWN_Y = PROMPT_BAND_H + 40;

// Per-level scroll speed (px/sec). Level 1 leaves ~8s reading window.
const LEVEL_SPEEDS = [110, 140, 170, 200, 230];
const LEVEL_PAUSE_MS = [700, 600, 500, 400, 350];

// Per-level palette accent shifts so Level 5 doesn't look like Level 1.
const LEVEL_TINTS = [0x0b1020, 0x1a1542, 0x2a0e3e, 0x3a0a32, 0x4a0820];

const MenuScene = window.EduCore.buildMenuScene(SPEC);

class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }
  preload() {
    window.EduCore.preloadSprites(this, ['player','rival','road','horizon','answer_panel','crash_particles']);
    window.EduCore.preloadGeneratedConcepts(this, SPEC.concepts.map(c => c.id));
  }
  create() {
    this.combo = 1;
    this.locked = false;
    this.endingLevel = false;
    this.gates = [];
    this.traffic = [];
    this.speedLines = [];

    // === LAYER 1: deepest background (color wash that shifts per level) ===
    this.skyLayer = this.add.rectangle(W / 2, H / 2, W, H, LEVEL_TINTS[0]).setDepth(-30);

    // === LAYER 2: distant horizon stars + far-off mountains (slow parallax) ===
    if (this.textures.exists('gen:theme_background')) {
      this.add.image(W / 2, H / 2, 'gen:theme_background').setDisplaySize(W, H).setDepth(-20).setAlpha(0.7);
    }
    this.farLayer = window.GameFeel.parallaxLayer(this, {
      depth: -15,
      speed: 22,
      spacing: 200,
      direction: 'down',
      factory: (y) => this.add.rectangle(
        80 + Math.random() * (W - 160),
        y + (Math.random() - 0.5) * 80,
        2 + Math.random() * 2, 2 + Math.random() * 2,
        0xfbbf24, 0.55,
      ),
    });

    // === LAYER 3: mid-range horizon stripe ===
    if (this.textures.exists('lib:horizon')) {
      this.add.image(W / 2, 280, 'lib:horizon').setDisplaySize(W, 240).setDepth(-10);
    } else {
      this.add.rectangle(W / 2, 280, W, 240, 0x312e81, 0.55).setDepth(-10);
    }

    // === LAYER 4: scrolling road tile (closest parallax, fastest) ===
    if (this.textures.exists('lib:road')) {
      this.road1 = this.add.image(W / 2, 760, 'lib:road').setDisplaySize(W, 720).setDepth(-5);
      this.road2 = this.add.image(W / 2, 40, 'lib:road').setDisplaySize(W, 720).setDepth(-5);
    } else {
      this.road1 = this.add.rectangle(W / 2, 760, W, 720, 0x0f172a, 0.7).setDepth(-5);
      this.road2 = this.add.rectangle(W / 2, 40, W, 720, 0x0f172a, 0.7).setDepth(-5);
    }

    // === Lane dividers (dashed lines) ===
    for (let i = 0; i < 2; i += 1) {
      const x = LANE_X[i] + (LANE_X[i + 1] - LANE_X[i]) / 2;
      for (let j = 0; j < 8; j += 1) {
        this.add.rectangle(x, j * 200, 4, 60, 0xfbbf24, 0.4).setDepth(-4);
      }
    }

    // === Prompt band — dim strip with the active question ===
    this.add.rectangle(W / 2, PROMPT_BAND_H / 2, W, PROMPT_BAND_H, 0x000000, 0.55).setDepth(60);
    this.promptText = window.EduCore.addText(this, W / 2, 140, '', {
      size: '28px', color: '#fbbf24', origin: [0.5, 0.5], wordWrap: { width: W - 60 },
    });
    this.promptText.setDepth(61);

    // === HUDs ===
    this.score = window.EduCore.makeScoreHud(this, 24, 24);
    this.timer = window.EduCore.makeTimerHud(this, W - 24, 24, SPEC.levels[0].timeLimitSeconds, () => this.endLevel());
    this.levelHud = window.EduCore.makeLevelHud(this, W / 2, 24, 1, 5);
    this.hearts = window.EduCore.makeHeartsHud(this, 80, 90, 3);

    // === Speedometer popup widget — small floating MPH on every correct ===
    this.speedMph = 60;

    this.buildPlayer();
    this.spawnAmbientTraffic();
    this.bindInput();

    // === Cinematic intro before the first lap ===
    window.GameFeel.audio.engineRev();
    window.GameFeel.levelStart(this, 1, 'LAP 1 — ' + (SPEC.levels[0].name || 'Start')).then(() => {
      this.startLevel(1);
    });
  }
  buildPlayer() {
    this.laneIndex = 1;
    const x = LANE_X[this.laneIndex];
    if (this.textures.exists('lib:player')) {
      this.player = this.add.image(x, PLAYER_Y, 'lib:player').setDisplaySize(96, 144);
    } else {
      this.player = this.add.rectangle(x, PLAYER_Y, 96, 144, 0xdc2626).setStrokeStyle(2, 0xfbbf24);
    }
    this.player.setDepth(50);
    // Subtle idle pulse on the car
    window.GameFeel.pulse(this.player, 0.025, 1400);
  }
  spawnAmbientTraffic() {
    // 4 rival cars at random lanes, scrolling down slower than the player to feel like
    // overtaking. They don't affect gameplay — purely atmosphere.
    for (let i = 0; i < 4; i += 1) {
      const lane = Phaser.Math.Between(0, 2);
      const y = -200 - i * 320;
      const car = this.textures.exists('lib:rival')
        ? this.add.image(LANE_X[lane], y, 'lib:rival').setDisplaySize(86, 128)
        : this.add.rectangle(LANE_X[lane], y, 86, 128, 0x06b6d4, 0.85);
      car.setDepth(40);
      this.traffic.push({ obj: car, baseSpeed: 30 + Math.random() * 30 });
    }
  }
  bindInput() {
    this.input.on('pointerdown', (p) => {
      if (this.locked) return;
      if (p.x < W / 2 && this.laneIndex > 0) this.swapLane(this.laneIndex - 1);
      if (p.x >= W / 2 && this.laneIndex < 2) this.swapLane(this.laneIndex + 1);
    });
  }
  swapLane(target) {
    this.laneIndex = target;
    // Tire smoke burst at the old position
    window.GameFeel.burst(this, this.player.x, this.player.y + 30, {
      count: 8, speed: 80, spread: Math.PI / 2,
      angle: Math.PI / 2, life: 500,
      colors: [0xfbbf24, 0xffffff, 0x9ca3af],
    });
    window.GameFeel.audio.woosh();
    this.tweens.add({
      targets: this.player,
      x: LANE_X[target],
      duration: 160,
      ease: 'sine.out',
    });
    window.GameFeel.squashStretch(this.player, 'x', 0.12, 200);
  }
  startLevel(idx) {
    this.currentLevel = idx;
    const lvl = SPEC.levels[idx - 1];
    this.levelHud.set(idx, 5);
    this.timer.reset(lvl.timeLimitSeconds);
    this.timer.start();
    this.speed = LEVEL_SPEEDS[idx - 1];
    this.pauseMs = LEVEL_PAUSE_MS[idx - 1];
    this.attempts = 0; this.correct = 0; this.hintsUsed = 0; this.correctIds = [];
    this.queue = Phaser.Utils.Array.Shuffle(lvl.contentItems.slice());

    // Per-level background tint shift
    this.skyLayer.setFillStyle(LEVEL_TINTS[idx - 1] || LEVEL_TINTS[4]);

    this.spawnGate();
  }
  spawnGate() {
    if (this.locked) return;
    if (this.queue.length === 0) return;
    if (this.gates.some((g) => !g.resolved)) return;
    const item = this.queue.shift();
    this.currentItem = item;
    this.promptText.setText(item.prompt);
    window.GameFeel.bounceIn(this.promptText, 0.6, 280);

    const correctLane = Phaser.Math.Between(0, 2);
    const distractors = (item.distractors || []).slice();
    const options = new Array(3);
    options[correctLane] = item.answer;
    let dIdx = 0;
    for (let i = 0; i < 3; i += 1) {
      if (i === correctLane) continue;
      options[i] = distractors[dIdx % distractors.length] || ('Option ' + (i + 1));
      dIdx += 1;
    }
    const panels = LANE_X.map((x, i) => this.makePanel(x, GATE_SPAWN_Y, options[i], item, i === correctLane));
    this.gates.push({ panels, item, resolved: false, y: GATE_SPAWN_Y });
  }
  makePanel(x, y, label, item, isCorrect) {
    const w = 200, h = 130;
    const bg = this.textures.exists('lib:answer_panel')
      ? this.add.image(x, y, 'lib:answer_panel').setDisplaySize(w, h)
      : this.add.rectangle(x, y, w, h, 0x1f2937, 0.95).setStrokeStyle(3, 0xfbbf24);
    bg.setDepth(30);
    const conceptId = item.concepts[0];
    let icon = null;
    if (conceptId && this.textures.exists('gen:' + conceptId)) {
      icon = this.add.image(x, y - 32, 'gen:' + conceptId).setDisplaySize(56, 56).setDepth(31);
    }
    const txt = window.EduCore.addText(this, x, y + (icon ? 28 : 0), label, {
      size: '24px', color: '#ffffff', origin: [0.5, 0.5], wordWrap: { width: w - 16 },
    });
    txt.setDepth(32);
    return { bg, icon, txt, x, isCorrect, item };
  }
  update(_t, delta) {
    if (this.locked) return;
    const dt = delta / 1000;
    const dy = this.speed * dt;
    // Road scroll
    this.road1.y += dy;
    this.road2.y += dy;
    if (this.road1.y >= H + 360) this.road1.y = this.road2.y - 720;
    if (this.road2.y >= H + 360) this.road2.y = this.road1.y - 720;
    // Ambient traffic
    for (const t of this.traffic) {
      t.obj.y += (this.speed - t.baseSpeed) * dt;
      if (t.obj.y > H + 200) {
        const lane = Phaser.Math.Between(0, 2);
        t.obj.x = LANE_X[lane];
        t.obj.y = -200 - Math.random() * 200;
        t.baseSpeed = 30 + Math.random() * 30;
      }
    }
    // Speed lines on the sides at high speed
    if (this.speed > 180 && Math.random() < 0.4) {
      const side = Math.random() < 0.5 ? 30 : W - 30;
      const line = this.add.rectangle(side, -20, 3, 80, 0xfff7c0, 0.5).setDepth(-3);
      this.speedLines.push(line);
      this.tweens.add({
        targets: line, y: H + 80, alpha: 0, duration: 600,
        onComplete: () => { line.destroy(); this.speedLines.splice(this.speedLines.indexOf(line), 1); },
      });
    }
    // Advance gates
    for (const g of this.gates) {
      if (g.resolved) continue;
      g.y += dy;
      for (const p of g.panels) {
        p.bg.y = g.y;
        if (p.icon) p.icon.y = g.y - 32;
        p.txt.y = g.y + (p.icon ? 28 : 0);
      }
      if (g.y > PLAYER_Y - 60) {
        const hitPanel = g.panels.find((p) => Math.abs(p.x - LANE_X[this.laneIndex]) < 60);
        this.resolveGate(g, hitPanel);
      }
    }
    this.gates = this.gates.filter((g) => {
      if (g.resolved && g.y > H + 200) {
        g.panels.forEach((p) => { p.bg.destroy(); if (p.icon) p.icon.destroy(); p.txt.destroy(); });
        return false;
      }
      return true;
    });
    if (this.queue.length === 0 && this.gates.length === 0 && !this.endingLevel) {
      this.endingLevel = true;
      this.time.delayedCall(800, () => this.endLevel());
    }
  }
  resolveGate(gate, hitPanel) {
    if (gate.resolved) return;
    gate.resolved = true;
    this.attempts += 1;
    if (hitPanel && hitPanel.isCorrect) {
      this.correct += 1;
      this.correctIds.push(gate.item.id);
      this.score.add(10);
      this.speedMph += 1;
      // Score popup with combo-aware color
      const isCombo = this.combo >= 3;
      window.GameFeel.scorePopup(
        this, hitPanel.bg.x, hitPanel.bg.y,
        '+10', isCombo ? 0xfbbf24 : 0xffffff,
      );
      // Tiny MPH popup under the player car
      window.GameFeel.scorePopup(this, this.player.x, this.player.y - 80, '+1 MPH', 0x5eead4);
      window.GameFeel.audio.correctChain(this.combo);
      if (this.combo >= 3) {
        window.GameFeel.comboPopup(this, W / 2, H * 0.5, this.combo);
      }
      window.GameFeel.celebrate(this, hitPanel.bg.x, hitPanel.bg.y, Math.min(2 + this.combo, 7));
      this.combo += 1;
      this.speed = Math.min(this.speed * 1.05, LEVEL_SPEEDS[this.currentLevel - 1] * 1.25);
    } else {
      this.hearts.lose();
      this.combo = 1;
      // Crash sequence — wobble car, smoke burst, hitstop, gentle shake, never harsh
      window.GameFeel.burst(this, this.player.x, this.player.y, {
        count: 14, speed: 220, spread: Math.PI * 2,
        life: 700, colors: [0xfbbf24, 0xdc2626, 0xffffff],
      });
      window.GameFeel.wobble(this.player, 12, 380);
      window.GameFeel.audio.impact();
      window.GameFeel.hitstop(this, 80);
      window.GameFeel.shake(this, 4, 220);
      window.GameFeel.punish(this);
      // Show explanation
      window.EduCore.showWrong(this, W / 2, H * 0.55, gate.item.explanationOnWrong);
      this.speed = Math.max(this.speed * 0.90, LEVEL_SPEEDS[this.currentLevel - 1] * 0.75);
      if (hitPanel && hitPanel.bg.setStrokeStyle) hitPanel.bg.setStrokeStyle(4, 0xdc2626);
    }
    if (this.queue.length > 0) {
      this.time.delayedCall(this.pauseMs, () => this.spawnGate());
    }
  }
  endLevel() {
    if (this.locked) return;
    this.locked = true;
    this.timer.stop();
    const lvl = SPEC.levels[this.currentLevel - 1];
    const timeUsedMs = (lvl.timeLimitSeconds - this.timer.remaining()) * 1000;
    const res = engine.completeLevel({
      correct: this.correct, attempts: this.attempts,
      timeUsedMs, timeLimitMs: lvl.timeLimitSeconds * 1000,
      hintsUsed: this.hintsUsed, maxHints: lvl.hintsAvailable,
      attemptedItems: lvl.contentItems, correctItems: this.correctIds,
    });
    window.EduMindAPI.reportLevel(this.currentLevel, res.score, res.accuracy, res.durationMs);

    // Stop in-flight tweens on speed lines so the celebration card is uncluttered
    this.speedLines.forEach((s) => s.destroy());
    this.speedLines.length = 0;

    window.GameFeel.audio.engineRev();
    window.GameFeel.levelEnd(this, this.score.value(), res.accuracy, () => {
      this.locked = false;
      this.endingLevel = false;
      if (res.stopReason) { this.finish(); return; }
      this.gates.forEach((g) => g.panels.forEach((p) => { p.bg.destroy(); if (p.icon) p.icon.destroy(); p.txt.destroy(); }));
      this.gates = [];
      this.promptText.setText('');
      // Cinematic intro for the next lap
      window.GameFeel.levelStart(this, res.nextLevel, 'LAP ' + res.nextLevel).then(() => {
        this.startLevel(res.nextLevel);
      });
    });
  }
  finish() {
    const summary = engine.buildSummary();
    window.EduMindAPI.reportSummary(summary);
    window.EduMindAPI.reportComplete(summary.totalScore, summary.masteryAchieved, summary.durationSeconds);
    window.GameFeel.audio.stopMusic();
    window.GameFeel.wipeOut(this, 'down', 400);
    this.time.delayedCall(420, () => this.scene.start('EndScene'));
  }
}

class EndScene extends (window.EduCore.buildEndScene(
  () => engine.buildSummary(),
  () => location.reload(),
  () => window.EduMindAPI.reportEvent('exit', {})
)) {}

new Phaser.Game({
  type: Phaser.AUTO,
  parent: 'game-container',
  width: W,
  height: H,
  backgroundColor: '#0b1020',
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  scene: [MenuScene, GameScene, EndScene],
});
</script>
</body>
</html>
