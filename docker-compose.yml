services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: edumind
      POSTGRES_USER: edumind
      POSTGRES_PASSWORD: edumind
    ports:
      - "5432:5432"
    volumes:
      - edumind_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edumind -d edumind"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  edumind_pg:
